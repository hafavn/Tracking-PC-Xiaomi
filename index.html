<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xiaomi PG Master Hub - V10.1</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        /* GIAO DIỆN XIAOMI DARK MODE BẢN QUYỀN */
        :root {
            --brand-color: #ff6700; /* Xiaomi Orange */
            --brand-glow: rgba(255, 103, 0, 0.4);
            --eco-color: #00bcd4; /* Xanh Cyan cho dòng Eco */
            --t-color: #a855f7; /* Tím nhẹ cho T Series */
            --pro-color: #3b82f6; /* Xanh Blue cho Pro Series */
            --bg-dark: #000000;   /* Nền đen tuyền */
            --surface-dark: #0d0d0d; /* Khung viền xám đen */
            --text-main: #ffffff; /* Chữ dữ liệu màu trắng */
            --text-muted: #888888;
            --border-color: #333333;
            --good-color: #3fb950;
            --warning-color: #d29922;
            --danger-color: #f85149;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg-dark); 
            color: var(--text-main); 
            padding: 20px; margin: 0; 
        }

        /* DẤU CHÌM BẢN QUYỀN Ở GÓC TRÊN BÊN TRÁI */
        .watermark {
            position: absolute;
            top: 25px;
            left: 30px;
            font-size: 14px;
            font-weight: 800;
            color: rgba(255, 255, 255, 0.15); /* Làm mờ dấu chìm */
            letter-spacing: 3px;
            text-transform: uppercase;
            z-index: 100;
            pointer-events: none; /* Không cản trở click chuột */
        }

        /* LOGO XIAOMI */
        .xiaomi-logo {
            position: absolute; top: 25px; right: 30px;
            width: 55px; height: 55px;
            z-index: 100;
            filter: drop-shadow(0 0 10px var(--brand-glow));
        }
        .xiaomi-logo img { width: 100%; height: 100%; object-fit: contain; }

        .container { 
            background: var(--surface-dark); padding: 20px; border-radius: 12px; 
            border: 1px solid var(--border-color); box-shadow: 0 4px 20px rgba(0,0,0,0.8); 
            max-width: 1550px; margin: 0 auto 20px auto; position: relative;
        }
        
        h2 { text-align: center; color: var(--brand-color); margin-top: 0; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 10px var(--brand-glow);}

        /* LAYOUT ĐIỀU KHIỂN TOP (Thu gọn Upload Area) */
        .top-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .info-bar { 
            background: rgba(255, 103, 0, 0.1); padding: 12px 15px; border-left: 4px solid var(--brand-color); 
            font-weight: bold; display: flex; justify-content: space-between; gap: 30px;
            color: var(--brand-color); border-radius: 4px; flex: 1; margin: 0;
        }
        
        .upload-compact { 
            display: flex; align-items: center; gap: 10px;
            padding: 8px 15px; border: 1px dashed var(--brand-color); 
            border-radius: 6px; background-color: rgba(255,255,255,0.02);
        }
        
        .upload-compact input[type="file"] { font-size: 13px; cursor: pointer; color: var(--text-main); max-width: 250px;}
        .upload-compact input[type="file"]::file-selector-button {
            background: var(--brand-color); color: #fff; border: none; padding: 6px 12px; border-radius: 4px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-right: 10px;
        }
        .upload-compact input[type="file"]::file-selector-button:hover { box-shadow: 0 0 10px var(--brand-glow); }

        /* Tabs */
        .tabs { display: flex; border-bottom: 1px solid var(--border-color); margin-bottom: 15px; gap: 5px; flex-wrap: wrap;}
        .tab-btn { 
            background: none; border: none; padding: 10px 18px; font-size: 13px; font-weight: bold; 
            cursor: pointer; color: var(--text-muted); transition: 0.3s; text-transform: uppercase; 
        }
        .tab-btn:hover { color: var(--text-main); }
        .tab-btn.active { color: var(--brand-color); border-bottom: 3px solid var(--brand-color); margin-bottom: -1px; text-shadow: 0 0 8px var(--brand-glow);}
        
        .tab-btn.eco-tab.active { color: var(--eco-color); border-bottom-color: var(--eco-color); text-shadow: 0 0 8px var(--eco-color);}
        .tab-btn.t-tab.active { color: var(--t-color); border-bottom-color: var(--t-color); text-shadow: 0 0 8px var(--t-color);}
        .tab-btn.pro-tab.active { color: var(--pro-color); border-bottom-color: var(--pro-color); text-shadow: 0 0 8px var(--pro-color);}

        /* Khung cuộn giới hạn chiều cao (V10 Feature) */
        .tab-content { display: none; }
        .tab-content.active { 
            display: block; overflow-x: auto; overflow-y: auto; 
            max-height: 65vh; border-bottom: 1px solid var(--border-color); border-radius: 4px;
        }

        /* Tables & Sticky Header */
        table { width: 100%; border-collapse: collapse; min-width: 1300px; }
        th, td { border: 1px solid var(--border-color); padding: 10px; text-align: center; vertical-align: middle; }
        th { 
            background-color: #151515; color: var(--brand-color); position: sticky; top: 0; z-index: 20; 
            font-weight: bold; cursor: pointer; transition: 0.2s; user-select: none; font-size: 13px; text-transform: uppercase;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.8); border-bottom: 2px solid var(--brand-color);
        }
        th:hover { background-color: #222; }
        td:nth-child(1), td:nth-child(2), td:nth-child(3) { text-align: left; color: var(--text-main); }
        tr.main-row:hover { background-color: rgba(255, 103, 0, 0.05); }

        .btn-toggle { background-color: transparent; border: 1px solid var(--brand-color); padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; color: var(--brand-color); transition: 0.3s;}
        .btn-toggle:hover { background-color: var(--brand-color); color: #000; box-shadow: 0 0 8px var(--brand-glow);}
        .shop-row { display: none; background-color: #050505; }
        .shop-table { width: 95%; margin: 10px auto; border: 1px dashed var(--border-color); background: transparent;}
        .shop-table th { background-color: transparent; font-size: 12px; color: var(--text-muted); cursor: default; border-bottom: 1px solid #333; box-shadow: none; position: static;}
        .shop-table td { font-size: 13px; color: #a3a3a3;}

        /* Inputs & Colors */
        .target-input { 
            width: 100px; padding: 8px; text-align: right; border: 1px solid var(--border-color); 
            border-radius: 4px; font-weight: bold; font-size: 14px; transition: 0.2s; outline: none; 
            background: #000; color: var(--brand-color); font-family: monospace;
        }
        .target-input:focus { border-color: var(--brand-color); box-shadow: 0 0 5px var(--brand-glow); }
        .RRP-input { width: 130px; }

        .good { color: var(--good-color); font-weight: bold; text-shadow: 0 0 5px rgba(63, 185, 80, 0.3);}
        .warning { color: var(--warning-color); font-weight: bold; text-shadow: 0 0 5px rgba(210, 153, 34, 0.3);}
        .danger { color: var(--danger-color); font-weight: bold; text-shadow: 0 0 5px rgba(248, 81, 73, 0.3);}
        .bep-col { background-color: rgba(255,255,255,0.02); border-left: 2px solid rgba(255,103,0,0.3) !important; } 
        
        .loading { color: var(--brand-color); display: none; font-weight: bold; animation: pulse 1s infinite; font-size: 13px;}
        .loading.error-state { color: var(--danger-color); animation: none; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; text-shadow: 0 0 10px var(--brand-glow);} 100% { opacity: 0.5; } }

        /* MENU EXCEL */
        .header-content { display: flex; justify-content: space-between; align-items: center; }
        .header-icon { font-size: 12px; opacity: 0.6; margin-left: 5px; color: var(--text-muted);}
        th.active-filter .header-icon { opacity: 1; color: var(--brand-color); text-shadow: 0 0 5px var(--brand-glow);} 

        .excel-menu { display: none; position: absolute; background: #111; border: 1px solid var(--brand-color); border-radius: 6px; box-shadow: 0 4px 15px rgba(0,0,0,0.8); width: 240px; z-index: 9999; font-weight: normal; text-transform: none; text-align: left; font-size: 13px; color: var(--text-main); }
        .excel-menu-item { padding: 10px 15px; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: 0.2s; }
        .excel-menu-item:hover { background-color: rgba(255, 103, 0, 0.15); color: var(--brand-color); }
        .excel-divider { height: 1px; background: var(--border-color); margin: 5px 0; }
        .excel-search-box { padding: 10px; }
        .excel-search-box input { width: 100%; box-sizing: border-box; background: #000; border: 1px solid var(--border-color); color: var(--text-main); padding: 8px; border-radius: 4px; outline: none; }
        .excel-search-box input:focus { border-color: var(--brand-color); }
        .excel-list { max-height: 180px; overflow-y: auto; padding: 0 10px 10px 10px; }
        .checkbox-item { display: flex; align-items: center; margin-bottom: 8px; cursor: pointer; color: var(--text-main);}
        .checkbox-item input { margin-right: 8px; cursor: pointer; accent-color: var(--brand-color);}
        .excel-footer { padding: 10px; border-top: 1px solid var(--border-color); display: flex; justify-content: space-between; background: #080808; border-bottom-left-radius: 6px; border-bottom-right-radius: 6px;}
        .btn-clear { background: transparent; color: var(--text-muted); border: 1px solid var(--border-color); padding: 6px 12px; border-radius: 4px; cursor: pointer; }
        .btn-apply { background: var(--brand-color); color: #000; border: none; padding: 6px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; transition: 0.3s;}
        .btn-apply:hover { box-shadow: 0 0 10px var(--brand-glow); }
    </style>
</head>
<body>

<div class="watermark">DESIGN BY PHAT PHAN</div>
<div class="xiaomi-logo">
    <img src="https://upload.wikimedia.org/wikipedia/commons/a/ae/Xiaomi_logo_%282021-%29.svg" alt="Xiaomi Logo">
</div>

<div class="container">
    <h2>XIAOMI PG REPORT HUB</h2>
    
    <div class="top-controls">
        <div class="info-bar" id="timeInfo"></div>
        <div class="upload-compact">
            <input type="file" id="excelUpload" accept=".xlsx, .xls, .csv">
            <div class="loading" id="loadingText">▶ DECRYPTING...</div>
        </div>
    </div>
</div>

<div class="container" id="dashboard" style="display: none;">
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('sheetSO')">SALES OUT (SO)</button>
        <button class="tab-btn" onclick="switchTab('sheetRRP')">REVENUE (RRP)</button>
        <button class="tab-btn" onclick="switchTab('sheetKM')">KEY MODEL</button>
        <button class="tab-btn t-tab" onclick="switchTab('sheetTSeries')">T SERIES</button>
        <button class="tab-btn pro-tab" onclick="switchTab('sheetProSeries')">PRO SERIES</button>
        <button class="tab-btn eco-tab" onclick="switchTab('sheetEco')">ECO SYSTEM</button>
    </div>

    <div id="excelMenu" class="excel-menu">
        <div class="excel-menu-item" onclick="applySort('asc')">⬇️ Sắp xếp Thấp đến Cao (A-Z)</div>
        <div class="excel-menu-item" onclick="applySort('desc')">⬆️ Sắp xếp Cao xuống Thấp (Z-A)</div>
        <div id="filterSection">
            <div class="excel-divider"></div>
            <div class="excel-search-box"><input type="text" id="filterSearch" placeholder="Tìm kiếm..."></div>
            <div class="excel-list" id="filterList"></div>
            <div class="excel-footer">
                <button class="btn-clear" onclick="clearFilter()">Bỏ lọc</button>
                <button class="btn-apply" onclick="applyFilter()">Áp dụng</button>
            </div>
        </div>
    </div>

    <div id="sheetSO" class="tab-content active"><table id="tableSO"><thead><tr id="headSO"></tr></thead><tbody></tbody></table></div>
    <div id="sheetRRP" class="tab-content"><table id="tableRRP"><thead><tr id="headRRP"></tr></thead><tbody></tbody></table></div>
    <div id="sheetKM" class="tab-content"><table id="tableKM"><thead><tr id="headKM"></tr></thead><tbody></tbody></table></div>
    <div id="sheetTSeries" class="tab-content"><table id="tableTSeries"><thead><tr id="headTSeries"></tr></thead><tbody></tbody></table></div>
    <div id="sheetProSeries" class="tab-content"><table id="tableProSeries"><thead><tr id="headProSeries"></tr></thead><tbody></tbody></table></div>
    <div id="sheetEco" class="tab-content"><table id="tableEco"><thead><tr id="headEco"></tr></thead><tbody></tbody></table></div>
</div>

<script>
    // ==========================================
    // CẤU HÌNH LOGIC NGHIỆP VỤ
    // ==========================================
    const BEP_VALUE = 216000000; 
    
    const T_SERIES_SPUS = ['O12A-EU', 'O12U-EU']; 
    const PRO_SERIES_SPUS = ['P16-EU', 'P16U-EU'];
    const KEY_MODEL_SPUS = [...T_SERIES_SPUS, ...PRO_SERIES_SPUS]; 
    const ECO_CATEGORIES = ['wearables', 'ecological chain', 'tv', 'others', 'tv box', 'washing machine', 'refrigerator', 'phone accessories']; 

    const today = new Date();
    const currentDay = today.getDate();
    const daysInMonth = new Date(today.getFullYear(), today.getMonth() + 1, 0).getDate();
    const passedDays = currentDay;
    const remainingDays = daysInMonth - currentDay;
    const divRemain = remainingDays > 0 ? remainingDays : 1;

    document.getElementById('timeInfo').innerHTML = `
        <span>SYS.DATE: ${currentDay}/${today.getMonth() + 1}/${today.getFullYear()}</span>
        <span>TIME LAPSED: ${passedDays}D | REMAINING: ${remainingDays}D</span>
    `;

    // Giữ nguyên Data Key V9 để bảo toàn Target 
    let savedTargets = JSON.parse(localStorage.getItem('pgTargetsData_V9')) || {};
    let fullPcArray = []; 
    let activeFilters = { Trainer: [], SR: [], PC: [] };
    let currentSort = { column: 'SO_actual', direction: 'desc' }; 
    let menuContext = { column: '', type: '', thElement: null };

    function formatNumber(num) { return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, "."); }
    window.switchTab = function(tabId) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    document.querySelectorAll('.tab-content').forEach(el => {
        el.addEventListener('scroll', () => { document.getElementById('excelMenu').style.display = 'none'; });
    });

    function getSafeValue(rowObj, possibleKeys) {
        for (let actualKey in rowObj) {
            let cleanActualKey = actualKey.trim().toLowerCase();
            for (let expectedKey of possibleKeys) {
                if (cleanActualKey === expectedKey.trim().toLowerCase()) {
                    return rowObj[actualKey];
                }
            }
        }
        return "";
    }

    function getThHTML(col, type, label, extraClass="") {
        return `<th data-col="${col}" data-type="${type}" class="${extraClass}" onclick="openExcelMenu(event, this)"><div class="header-content"><span>${label}</span><span class="header-icon">▼</span></div></th>`;
    }

    function buildHeaders() {
        const base = getThHTML('Trainer', 'text', 'Trainer') + getThHTML('SR', 'text', 'SR') + getThHTML('PC', 'text', 'PC Name') + `<th>Detail</th>`;
        const metrics = (pre, lbl) => getThHTML(`${pre}_actual`, 'number', `Actual ${lbl}`) + getThHTML(`${pre}_target`, 'number', `Target ${lbl}`) + getThHTML(`${pre}_ach`, 'number', `% Ach`) + getThHTML(`${pre}_est`, 'number', `Est %`) + getThHTML(`${pre}_run`, 'number', `Run-rate/Day`);
        
        document.getElementById('headSO').innerHTML = base + metrics('SO', 'SO');
        document.getElementById('headRRP').innerHTML = base + metrics('RRP', 'RRP') + getThHTML('RRP_gapbep', 'number', 'GAP BEP (216M)', 'bep-col') + getThHTML('RRP_runbep', 'number', 'By day BEP', 'bep-col');
        document.getElementById('headKM').innerHTML = base + metrics('KM', 'Key Model');
        document.getElementById('headTSeries').innerHTML = base + metrics('TSeries', 'T Series');
        document.getElementById('headProSeries').innerHTML = base + metrics('ProSeries', 'Pro Series');
        document.getElementById('headEco').innerHTML = base + metrics('Eco', 'Eco (VNĐ)');
    }

    document.getElementById('excelUpload').addEventListener('change', function(e) {
        var file = e.target.files[0];
        if (!file) return;

        let loadingEl = document.getElementById('loadingText');
        loadingEl.style.display = 'block'; loadingEl.className = 'loading';
        loadingEl.innerHTML = '▶ DECRYPTING...';
        document.getElementById('dashboard').style.display = 'none';

        setTimeout(() => {
            var reader = new FileReader();
            reader.onload = function(e) {
                try {
                    var data = new Uint8Array(e.target.result);
                    var workbook = XLSX.read(data, {type: 'array'});
                    var jsonData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], {raw: false});
                    processData(jsonData);
                    loadingEl.style.display = 'none';
                } catch (error) {
                    loadingEl.className = 'loading error-state';
                    loadingEl.innerHTML = '❌ ERROR';
                }
            };
            reader.readAsArrayBuffer(file);
        }, 50);
    });

    function processData(data) {
        let pcDataMap = {}; 
        data.forEach(row => {
            let verifyRes = String(getSafeValue(row, ['Verification Result', 'Verification']) || "").trim().toLowerCase();
            if (verifyRes === 'failed') return;

            let trainerName = String(getSafeValue(row, ['Trainer', 'Trainer Name']) || "").trim(); 
            let srName = String(getSafeValue(row, ['SR', 'SR Name']) || "").trim();           
            let pcName = String(getSafeValue(row, ['Salesman Name', 'Salesman', 'PC Name', 'PC', 'Promoter Name']) || "").trim();
            let shopName = String(getSafeValue(row, ['Store Name', 'Shop Name', 'Retailer Name']) || "Unknown Store").trim();
            
            let productLine = String(getSafeValue(row, ['Product Line EN', 'Product Line']) || "").trim().toLowerCase();
            let spuEn = String(getSafeValue(row, ['SPU EN', 'SPU']) || "").trim().toUpperCase(); 
            
            let rrpStr = String(getSafeValue(row, ['RRP', 'Doanh thu', 'Revenue']) || "0").replace(/,/g, '');
            let rrp = parseFloat(rrpStr) || 0;

            let isPhonePad = productLine.includes('smartphone') || productLine.includes('pad');
            let isEco = ECO_CATEGORIES.some(cat => productLine.includes(cat) || productLine === cat);
            
            let isTSeries = T_SERIES_SPUS.includes(spuEn);
            let isProSeries = PRO_SERIES_SPUS.includes(spuEn);
            let isKeyModel = KEY_MODEL_SPUS.includes(spuEn);

            if (pcName && (isPhonePad || isEco || isKeyModel)) {
                if (!pcDataMap[pcName]) {
                    pcDataMap[pcName] = { Trainer: trainerName, SR: srName, name: pcName, SO: 0, RRP: 0, KM: 0, TSeries: 0, ProSeries: 0, Eco: 0, Shops: {}, calc: {} };
                    
                    if(!savedTargets[pcName]) savedTargets[pcName] = { SO: 0, RRP: 0, KM: 0, TSeries: 0, ProSeries: 0, Eco: 0 };
                    savedTargets[pcName].KM = savedTargets[pcName].KM || 0;
                    savedTargets[pcName].TSeries = savedTargets[pcName].TSeries || 0;
                    savedTargets[pcName].ProSeries = savedTargets[pcName].ProSeries || 0;
                    savedTargets[pcName].Eco = savedTargets[pcName].Eco || 0;
                }
                
                if (!pcDataMap[pcName].Shops[shopName]) pcDataMap[pcName].Shops[shopName] = { SO: 0, RRP: 0, KM: 0, TSeries: 0, ProSeries: 0, Eco: 0 };

                if (isPhonePad) {
                    pcDataMap[pcName].SO += 1; pcDataMap[pcName].RRP += rrp;
                    pcDataMap[pcName].Shops[shopName].SO += 1; pcDataMap[pcName].Shops[shopName].RRP += rrp;
                }

                if (isKeyModel) { pcDataMap[pcName].KM += 1; pcDataMap[pcName].Shops[shopName].KM += 1; }
                if (isTSeries) { pcDataMap[pcName].TSeries += 1; pcDataMap[pcName].Shops[shopName].TSeries += 1; }
                if (isProSeries) { pcDataMap[pcName].ProSeries += 1; pcDataMap[pcName].Shops[shopName].ProSeries += 1; }
                if (isEco) { pcDataMap[pcName].Eco += rrp; pcDataMap[pcName].Shops[shopName].Eco += rrp; }
            }
        });

        fullPcArray = Object.values(pcDataMap);
        if(fullPcArray.length === 0) {
            document.getElementById('loadingText').className = 'loading error-state';
            document.getElementById('loadingText').style.display = 'block';
            document.getElementById('loadingText').innerHTML = '❌ NO VALID DATA';
            return;
        }

        fullPcArray.forEach(pc => calculateMetricsForPC(pc));
        buildHeaders();
        renderTables();
        document.getElementById('dashboard').style.display = 'block';
    }

    function calcBlock(actual, target) {
        let res = { target: target, ach: 0, est: 0, runrate: 0, gap: 0 };
        if(target > 0) {
            res.ach = (actual / target) * 100;
            res.est = ((actual / passedDays) * daysInMonth / target) * 100;
            res.gap = target - actual;
            res.runrate = res.gap > 0 ? (res.gap / divRemain) : 0;
        }
        return res;
    }

    function calculateMetricsForPC(pc) {
        pc.calc = {
            SO: calcBlock(pc.SO, savedTargets[pc.name]?.SO || 0),
            RRP: calcBlock(pc.RRP, savedTargets[pc.name]?.RRP || 0),
            KM: calcBlock(pc.KM, savedTargets[pc.name]?.KM || 0),
            TSeries: calcBlock(pc.TSeries, savedTargets[pc.name]?.TSeries || 0),
            ProSeries: calcBlock(pc.ProSeries, savedTargets[pc.name]?.ProSeries || 0),
            Eco: calcBlock(pc.Eco, savedTargets[pc.name]?.Eco || 0)
        };
    }

    const excelMenu = document.getElementById('excelMenu');
    const searchInput = document.getElementById('filterSearch');
    const filterSection = document.getElementById('filterSection');
    const listContainer = document.getElementById('filterList');

    window.openExcelMenu = function(e, thEl) {
        let col = thEl.getAttribute('data-col'); let type = thEl.getAttribute('data-type');
        if (excelMenu.style.display === 'block' && menuContext.column === col) { excelMenu.style.display = 'none'; return; }
        
        menuContext = { column: col, type: type, thElement: thEl };
        excelMenu.style.top = (thEl.getBoundingClientRect().bottom + window.scrollY + 5) + 'px';
        excelMenu.style.left = (thEl.getBoundingClientRect().left + window.scrollX) + 'px';
        excelMenu.style.display = 'block';

        if(type === 'text') { filterSection.style.display = 'block'; buildFilterCheckboxes(""); setTimeout(() => searchInput.focus(), 100); } 
        else { filterSection.style.display = 'none'; }
    }

    searchInput.addEventListener('keyup', function() { buildFilterCheckboxes(this.value.toLowerCase()); });

    function buildFilterCheckboxes(searchTerm) {
        listContainer.innerHTML = '';
        let colKey = menuContext.column === 'PC' ? 'name' : menuContext.column;
        let allValues = [...new Set(fullPcArray.map(item => item[colKey]))].sort();
        let isAllChecked = activeFilters[menuContext.column].length === 0;
        listContainer.innerHTML += `<label class="checkbox-item" style="color:var(--brand-color); font-weight:bold;"><input type="checkbox" id="checkAll" ${isAllChecked ? 'checked' : ''} onchange="toggleAll(this)"> (Select All)</label>`;

        allValues.forEach(val => {
            let dVal = val === "" ? "(Blank)" : val;
            if (dVal.toLowerCase().includes(searchTerm)) {
                let isChecked = isAllChecked || activeFilters[menuContext.column].includes(val);
                listContainer.innerHTML += `<label class="checkbox-item"><input type="checkbox" class="chk-item" value="${val}" ${isChecked ? 'checked' : ''} onchange="updateCheckAll()"> ${dVal}</label>`;
            }
        });
    }

    window.toggleAll = function(m) { document.querySelectorAll('.chk-item').forEach(c => c.checked = m.checked); }
    window.updateCheckAll = function() { document.getElementById('checkAll').checked = Array.from(document.querySelectorAll('.chk-item')).every(c => c.checked); }
    window.applyFilter = function() {
        let selectedVals = [];
        if (document.getElementById('checkAll').checked && searchInput.value === "") { activeFilters[menuContext.column] = []; menuContext.thElement.classList.remove('active-filter'); } 
        else { document.querySelectorAll('.chk-item').forEach(c => { if(c.checked) selectedVals.push(c.value); }); activeFilters[menuContext.column] = selectedVals; menuContext.thElement.classList.add('active-filter'); }
        excelMenu.style.display = 'none'; renderTables();
    }
    window.clearFilter = function() { activeFilters[menuContext.column] = []; menuContext.thElement.classList.remove('active-filter'); excelMenu.style.display = 'none'; renderTables(); }

    window.applySort = function(direction) { currentSort = { column: menuContext.column, direction: direction }; excelMenu.style.display = 'none'; renderTables(); }

    function getSortValue(pc, colName) {
        if(colName === 'Trainer') return pc.Trainer.toLowerCase();
        if(colName === 'SR') return pc.SR.toLowerCase();
        if(colName === 'PC') return pc.name.toLowerCase();
        
        let [prefix, suffix] = colName.split('_');
        
        if(suffix === 'gapbep') return pc.RRP - BEP_VALUE;
        if(suffix === 'runbep') return (BEP_VALUE - pc.RRP) > 0 ? (BEP_VALUE - pc.RRP) : 0;
        if(suffix === 'actual') return pc[prefix];
        if(suffix === 'target') return pc.calc[prefix].target;
        if(suffix === 'ach') return pc.calc[prefix].ach;
        if(suffix === 'est') return pc.calc[prefix].est;
        if(suffix === 'run') return pc.calc[prefix].runrate;
        return 0;
    }

    document.addEventListener('click', function(e) { if (!excelMenu.contains(e.target) && !e.target.closest('th')) excelMenu.style.display = 'none'; });

    function renderTables() {
        const tbodies = {
            SO: document.querySelector('#tableSO tbody'), RRP: document.querySelector('#tableRRP tbody'),
            KM: document.querySelector('#tableKM tbody'), TSeries: document.querySelector('#tableTSeries tbody'),
            ProSeries: document.querySelector('#tableProSeries tbody'), Eco: document.querySelector('#tableEco tbody')
        };
        for(let key in tbodies) tbodies[key].innerHTML = '';

        let displayArray = fullPcArray.filter(pc => {
            let pT = activeFilters.Trainer.length === 0 || activeFilters.Trainer.includes(pc.Trainer);
            let pS = activeFilters.SR.length === 0 || activeFilters.SR.includes(pc.SR);
            let pP = activeFilters.PC.length === 0 || activeFilters.PC.includes(pc.name);
            return pT && pS && pP;
        });

        displayArray.sort((a, b) => {
            let valA = getSortValue(a, currentSort.column); let valB = getSortValue(b, currentSort.column);
            if (valA < valB) return currentSort.direction === 'asc' ? -1 : 1;
            if (valA > valB) return currentSort.direction === 'asc' ? 1 : -1;
            return 0;
        });

        displayArray.forEach((pc, index) => {
            let shopId = `shop_${index}`;

            let shopTableHTML = `<table class="shop-table"><thead><tr><th style="text-align:left">Store Name</th><th>SO</th><th>RRP (VNĐ)</th><th>Total KM</th><th style="color:var(--t-color)">T Series</th><th style="color:var(--pro-color)">Pro Series</th><th style="color:var(--eco-color)">Eco (VNĐ)</th></tr></thead><tbody>`;
            for (let [sName, sData] of Object.entries(pc.Shops)) { 
                shopTableHTML += `<tr><td style="text-align:left">${sName}</td><td>${sData.SO.toLocaleString('vi-VN')}</td><td>${formatNumber(sData.RRP)}</td><td>${sData.KM.toLocaleString('vi-VN')}</td><td style="color:var(--t-color); font-weight:bold">${sData.TSeries.toLocaleString('vi-VN')}</td><td style="color:var(--pro-color); font-weight:bold">${sData.ProSeries.toLocaleString('vi-VN')}</td><td style="color:var(--eco-color); font-weight:bold">${formatNumber(sData.Eco)}</td></tr>`; 
            }
            shopTableHTML += `</tbody></table>`;
            let subRowStr = `<tr id="[ID]" class="shop-row"><td colspan="15">${shopTableHTML}</td></tr>`;

            const makeRow = (type, actualVal, isMoney, extraCols = "", highlightColor = "var(--brand-color)") => {
                let displayVal = isMoney ? formatNumber(actualVal) : actualVal.toLocaleString('vi-VN');
                return `<tr class="main-row">
                    <td>${pc.Trainer || '-'}</td><td>${pc.SR || '-'}</td><td style="font-weight:bold;">${pc.name}</td>
                    <td><button class="btn-toggle" onclick="toggleShop('${type}_${shopId}')">Show ▼</button></td>
                    <td style="font-weight:bold; color:${highlightColor}; font-size:15px;">${displayVal}</td>
                    <td><input type="text" class="target-input ${isMoney?'RRP-input':''}" value="${pc.calc[type].target ? formatNumber(pc.calc[type].target) : ''}" data-name="${pc.name}" data-type="${type}" oninput="handleTargetInput(this)"></td>
                    <td class="cell-ach"></td><td class="cell-est"></td><td class="cell-run"></td>${extraCols}
                </tr>` + subRowStr.replace('[ID]', `${type}_${shopId}`);
            };

            let gapBep = pc.RRP - BEP_VALUE; let runBep = (BEP_VALUE - pc.RRP) > 0 ? (BEP_VALUE - pc.RRP) / divRemain : 0;
            let bepCols = `<td class="bep-col ${gapBep >= 0 ? 'good' : 'danger'}">${formatNumber(gapBep)}</td><td class="bep-col ${runBep <= 0 ? 'good' : 'warning'}">${runBep > 0 ? formatNumber(Math.ceil(runBep)) : 'ACHIEVED!'}</td>`;

            tbodies.SO.innerHTML += makeRow('SO', pc.SO, false);
            tbodies.RRP.innerHTML += makeRow('RRP', pc.RRP, true, bepCols);
            tbodies.KM.innerHTML += makeRow('KM', pc.KM, false);
            tbodies.TSeries.innerHTML += makeRow('TSeries', pc.TSeries, false, "", "var(--t-color)");
            tbodies.ProSeries.innerHTML += makeRow('ProSeries', pc.ProSeries, false, "", "var(--pro-color)");
            tbodies.Eco.innerHTML += makeRow('Eco', pc.Eco, true, "", "var(--eco-color)");
        });

        document.querySelectorAll('.main-row').forEach(row => {
            let inputEl = row.querySelector('.target-input');
            if(inputEl) updateDOMCells(row, fullPcArray.find(p => p.name === inputEl.getAttribute('data-name')), inputEl.getAttribute('data-type'));
        });
    }

    window.toggleShop = function(rowId) {
        let el = document.getElementById(rowId); el.style.display = (el.style.display === 'table-row') ? 'none' : 'table-row';
    }

    window.handleTargetInput = function(inputEl) {
        let rawVal = inputEl.value.replace(/\D/g, ''); inputEl.value = rawVal === '' ? '' : formatNumber(parseInt(rawVal, 10));
        let pcName = inputEl.getAttribute('data-name'); let type = inputEl.getAttribute('data-type');
        let newTarget = parseInt(rawVal, 10) || 0;
        
        savedTargets[pcName][type] = newTarget; localStorage.setItem('pgTargetsData_V9', JSON.stringify(savedTargets));
        let pc = fullPcArray.find(p => p.name === pcName);
        calculateMetricsForPC(pc); updateDOMCells(inputEl.closest('tr'), pc, type);
    }

    function updateDOMCells(tr, pc, type) {
        let achCell = tr.querySelector('.cell-ach'); let estCell = tr.querySelector('.cell-est'); let runCell = tr.querySelector('.cell-run');
        let calc = pc.calc[type];

        if (calc.target > 0) {
            achCell.innerText = calc.ach.toFixed(1) + '%'; estCell.innerText = calc.est.toFixed(1) + '%';
            
            let isQty = (type === 'SO' || type === 'KM' || type === 'TSeries' || type === 'ProSeries');
            runCell.innerText = calc.gap <= 0 ? "ACHIEVED!" : (isQty ? Math.ceil(calc.runrate) : formatNumber(Math.round(calc.runrate)));

            achCell.className = 'cell-ach ' + (calc.ach >= 100 ? 'good' : '');
            estCell.className = 'cell-est ' + (calc.est >= 100 ? 'good' : (calc.est >= 80 ? 'warning' : 'danger'));
            runCell.className = 'cell-run ' + (calc.gap <= 0 ? 'good' : '');
        } else {
            achCell.innerText = "-"; estCell.innerText = "-"; runCell.innerText = "-";
            achCell.className = "cell-ach"; estCell.className = "cell-est"; runCell.className = "cell-run";
        }
    }
</script>

</body>
